<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loader Mini Game</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #game-container {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 300px;
    }

    h2 {
      margin-bottom: 10px;
    }

    #bug {
      font-size: 40px;
      cursor: pointer;
      position: relative;
      display: inline-block;
      transition: transform 0.2s;
    }

    #bug:hover {
      transform: scale(1.2);
    }

    #score {
      margin-top: 15px;
      font-size: 18px;
    }

    #timer {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

    #startBtn {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div id="game-container">
  <h2>Still Loading...</h2>
  <p>Meanwhile, catch the bug 🐞</p>

  <div id="bug">🐞</div>

  <div id="score">Caught: 0</div>
  <div id="timer">Time left: 10s</div>

  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<script>
let score = 0;
let timeLeft = 10;
let gameInterval;
let moveInterval;

const bug = document.getElementById("bug");

function startGame() {
  score = 0;
  timeLeft = 10;
  document.getElementById("score").innerText = "Caught: 0";
  document.getElementById("timer").innerText = "Time left: 10s";

  clearInterval(gameInterval);
  clearInterval(moveInterval);

  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(gameInterval);
      clearInterval(moveInterval);
      alert("Game Over! You caught " + score + " bugs 🐞");
    }
  }, 1000);

  moveInterval = setInterval(moveBug, 800);
}

bug.onclick = function () {
  score++;
  document.getElementById("score").innerText = "Caught: " + score;
};

function moveBug() {
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;
  bug.style.transform = `translate(${x}px, ${y}px)`;
}
</script>

</body>
</html>
